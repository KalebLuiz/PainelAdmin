<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>SLFood</title>
</head>
<body>
    <header>
        <div class="divblockmenu">
        <div class="blockmenu">
            <div class="blockmenutexto">
                <p>SLFood - Sistema de Gestão</p>
                <p><span id="adminuser"></span> (admin)</p>
            </div>
        </div>
    </div>
    </header>

    <div class="blocktabela-papeis">
        
        <table border="1" id="retorno_papeis">
            <tr>
                <th>Papel</th>
                <th>Seleção</th>
            </tr>
            
           

            
        </table>
        <div class="botoesfuncao">
            <button class="btn1">Remover</button>
            <button class="btn2" onclick="retornarPapel()">Alterar</button>
            <button class="btn3">Novo</button>
            <button class="btn4" onclick="window.location.href='index.html';">Voltar</button>
        </div>
        

    </div>

    

    <div class="block-novopapel" style="display: none;" >
        <p>Papel</p>
        <form id="formularioNovoPapel">
            <label> Novo Papel</label>
            <input type="text" id="campoPapel" class="campoPapel" required>
            <input type="button" id="NovoPapelCriado" onclick="CriarPapel()" value="Cadastrar Novo Papel">
            <input type="button" value="Cancelar" onclick="window.location.href='manter_papeis.html'">
        </form>
    </div>


    <div class="block-Edicaopapel" style="display: none;" >
        <p>Alteração do Papel</p>
        <form id="formularioEditarPapel">
            <label>Papel</label>
            <input type="text" id="campoEditarPapel" class="campoEditarPapel" required>
            <input type="button" id="EditarPapelCriado" onclick="" value="Atualizar Papel">
            <input type="button" value="Cancelar" onclick="window.location.href='manter_papeis.html'">
        </form>
    </div>




    
    <script src="script.js"></script>
    <script src="conexao.js"></script>
    <script src="verifc.js"></script>
  
    
</body>
</html>
