<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>SLFood</title>
</head>
<body>
    <header>
        <div class="divblockmenu">
        <div class="blockmenu">
            <div class="blockmenutexto">
                <p>SLFood - Sistema de Gestão</p>
                <p>Kaleb(admin)</p>
            </div>
        </div>
    </div>
    </header>

    <div class="blocktabela-papeis">
        
        <table border="1">
            <tr>
                <th>Papel</th>
                <th>Seleção</th>
            </tr>
            <tr>
                <th>Admin</th>
                <th><input type="radio" name="opcao" id="cargoadmin" checked></th>
            </tr>
            <tr>
                <th>Cozinheiro</th>
                <th><input type="radio" name="opcao" id="cargoauxcozinha" checked></th>
            </tr>
            <tr>
                <th>Atendente</th>
                <th><input type="radio" name="opcao" id="cargochefe" checked></th>
            </tr>
            <tr>
                <th>Aux de Cozinha</th>
                <th><input type="radio" name="opcao" id="cargochefe" checked></th>
            </tr>
            <tr>
                <th>Entregador</th>
                <th><input type="radio" name="opcao" id="cargochefe" checked></th>
            </tr>

            
        </table>
        <div class="botoesfuncao">
            <button class="btn1">Remover</button>
            <button class="btn2">Alterar</button>
            <button class="btn3">Novo</button>
            <button class="btn4" onclick="window.location.href='index.html';">Voltar</button>
        </div>
        

    </div>

    

    <div class="block-novopapel" style="display: none;" >
        <form>
            <label>Papel</label>
            <select class="blockopcoes" name="papeis" required="required">
                 
                <option value="entregador">Entregador</option>
                <option value="auxiliarcozinha">Auxiliar De Cozinha</option>
                <option value="atendente">Atendente</option>
                <option value="cozinheiro">Cozinheiro</option>
                <option value="admin">Admin</option>
            </select>
            <input type="submit" value="Selecionar">
        </form>
    </div>
    <script src="script.js"></script>
</body>
</html>
